# Local dev reverse-proxy vhosts for the Postback System.
# Include this file from XAMPP's httpd-vhosts.conf (c:\xampp83\apache\conf\extra\httpd-vhosts.conf),
# e.g. add: Include "c:/xampp83/htdocs/postback-system/deploy/apache/babawha-local.conf"
#
# Requires mod_proxy_http enabled in httpd.conf:
#   LoadModule proxy_http_module modules/mod_proxy_http.so
#
# Also requires hosts-file entries (C:\Windows\System32\drivers\etc\hosts):
#   127.0.0.1 babawha.local
#   127.0.0.1 babapi.babawha.local
#   127.0.0.1 backdash.babawha.local
#
# IMPORTANT: once any named <VirtualHost *:80> exists, Apache no longer falls back to the
# main server's DocumentRoot for requests that don't match a ServerName below — it uses
# whichever vhost is listed FIRST as the default. This "localhost" vhost is kept first and
# explicit so http://localhost/ (XAMPP dashboard, phpMyAdmin, etc.) keeps working normally.

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "C:/xampp83/htdocs"
</VirtualHost>

<VirtualHost *:80>
    ServerName babawha.local
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/
</VirtualHost>

<VirtualHost *:80>
    ServerName babapi.babawha.local
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8082/
    ProxyPassReverse / http://127.0.0.1:8082/
</VirtualHost>

<VirtualHost *:80>
    ServerName backdash.babawha.local
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8083/
    ProxyPassReverse / http://127.0.0.1:8083/
</VirtualHost>
